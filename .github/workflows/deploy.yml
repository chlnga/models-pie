name: Deploy to Cloudflare

# This workflow is for the SCHEDULED redeploy only (refreshes the fetched
# model data every 6 hours). Push-to-main deploys are handled by Cloudflare's
# native Git integration, so `push` is intentionally NOT a trigger here
# (avoids double-deploys). Run manually via the Actions tab if needed.
on:
  schedule:
    # Every 6 hours at minute 0 — 00:00, 06:00, 12:00, 18:00 UTC.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch and compile data
        run: npm run setup

      - name: Build
        env:
          BASE_PATH: /
        run: npm run build

      # Reads ./wrangler.jsonc and uploads the pre-built dist/ as static
      # assets (no Worker script, no rebuild). Requires repo secrets:
      #   CLOUDFLARE_API_TOKEN  — token with "Workers Scripts: Edit"
      #   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
      - name: Deploy via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
